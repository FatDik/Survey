<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Survey Kepuasan Organisasi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50:  #EEEDFE;
      --purple-100: #CECBF6;
      --purple-200: #AFA9EC;
      --purple-400: #7F77DD;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --purple-900: #26215C;
      --gray-50:  #F1EFE8;
      --gray-100: #D3D1C7;
      --gray-400: #888780;
      --gray-600: #5F5E5A;
      --green-50:  #EAF3DE;
      --green-800: #27500A;
      --amber-50:  #FAEEDA;
      --amber-800: #633806;
      --red-50:    #FCEBEB;
      --red-800:   #791F1F;
      --teal-50:   #E1F5EE;
      --teal-800:  #085041;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1a1a2e;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 0.5px solid var(--gray-100);
      padding: 12px 20px 10px;
    }
    .topbar-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--purple-800);
      margin-bottom: 8px;
    }
    .progress-wrap { height: 3px; background: var(--purple-50); border-radius: 2px; }
    .progress-fill { height: 3px; background: var(--purple-600); border-radius: 2px; transition: width 0.4s ease; }
    .progress-label { font-size: 11px; color: var(--gray-400); margin-top: 5px; }

    /* ── Main content ── */
    .main { flex: 1; padding: 24px 20px 100px; }

    /* ── Panel animation ── */
    .panel { animation: up 0.22s ease; }
    @keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Question ── */
    .q-accent { font-size: 48px; font-weight: 700; color: var(--purple-100); line-height: 1; margin-bottom: 6px; }
    .q-text { font-size: 17px; line-height: 1.55; color: #1a1a2e; margin-bottom: 28px; }

    /* ── Likert — vertical on mobile ── */
    .likert-col { display: flex; flex-direction: column; gap: 10px; }
    .likert-opt {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--gray-100);
      border-radius: 12px;
      cursor: pointer;
      background: #fff;
      transition: all 0.14s;
      -webkit-tap-highlight-color: transparent;
    }
    .likert-opt:active { transform: scale(0.98); }
    .likert-opt .num {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 500;
      background: var(--purple-50); color: var(--purple-600);
      flex-shrink: 0; transition: all 0.14s;
    }
    .likert-opt .lbl { font-size: 14px; color: #555; transition: color 0.14s; }
    .likert-opt.sel { background: var(--purple-600); border-color: var(--purple-600); }
    .likert-opt.sel .num { background: rgba(255,255,255,0.25); color: #fff; }
    .likert-opt.sel .lbl { color: #fff; font-weight: 500; }

    /* ── Error ── */
    .err { font-size: 13px; color: #A32D2D; margin-top: 12px; display: none; }

    /* ── Bottom nav bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 0.5px solid var(--gray-100);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
    }
    .btn-back {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      border: 1px solid var(--gray-100);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 20px;
      color: var(--gray-600);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:active { background: var(--gray-50); }
    .btn-next {
      flex: 1;
      height: 48px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--purple-600);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active { background: var(--purple-800); }
    .btn-next:disabled { background: var(--gray-100); color: var(--gray-400); cursor: not-allowed; }
    .btn-submit {
      flex: 1; height: 48px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--purple-600); color: #fff;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:active { background: var(--purple-800); }
    .btn-submit:disabled { background: var(--gray-100); color: var(--gray-400); }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--purple-600); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }
    .field input {
      width: 100%; padding: 13px 14px; font-size: 15px;
      font-family: inherit; color: #1a1a2e; background: #fff;
      border: 1px solid var(--gray-100); border-radius: 10px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--purple-600); box-shadow: 0 0 0 3px var(--purple-50); }

    /* ── Textarea ── */
    textarea {
      width: 100%; min-height: 130px; padding: 13px 14px;
      font-size: 15px; font-family: inherit; color: #1a1a2e;
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: 10px; resize: none; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: var(--purple-600); box-shadow: 0 0 0 3px var(--purple-50); }

    /* ── Result ── */
    .result-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--purple-50);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--purple-600);
      margin: 0 auto 16px;
    }
    .result-title { font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 6px; }
    .result-sub   { font-size: 14px; color: var(--gray-400); text-align: center; margin-bottom: 20px; line-height: 1.5; }

    .id-chip {
      background: var(--purple-50); color: var(--purple-800);
      border-radius: 10px; padding: 10px 14px; font-size: 14px;
      margin-bottom: 16px;
    }

    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: #fff; border: 1px solid var(--gray-100); border-radius: 10px; padding: 12px; }
    .stat-card .slabel { font-size: 11px; color: var(--gray-400); margin-bottom: 3px; }
    .stat-card .sval { font-size: 22px; font-weight: 500; }
    .stat-card .ssub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

    .bar-section { margin-bottom: 16px; }
    .bar-section h3 { font-size: 12px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .bar-label { font-size: 12px; color: #555; width: 100px; flex-shrink: 0; line-height: 1.3; }
    .bar-track { flex: 1; height: 6px; background: var(--gray-50); border-radius: 3px; overflow: hidden; }
    .bar-fill  { height: 6px; background: var(--purple-600); border-radius: 3px; transition: width 0.5s ease; }
    .bar-num   { font-size: 12px; font-weight: 500; color: #1a1a2e; width: 16px; text-align: right; }

    .saran-box { background: #fff; border: 1px solid var(--gray-100); border-radius: 10px; padding: 14px; }
    .saran-box .slabel2 { font-size: 12px; color: var(--gray-400); margin-bottom: 6px; }
    .saran-box .stext   { font-size: 14px; color: #1a1a2e; line-height: 1.6; }

    .badge-ok  { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--teal-800); background: var(--teal-50); padding: 5px 12px; border-radius: 20px; margin-bottom: 14px; }
    .badge-err { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--red-800); background: var(--red-50);  padding: 5px 12px; border-radius: 20px; margin-bottom: 14px; }

    /* ── Loading ── */
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(245,244,255,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; z-index: 999;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--purple-50);
      border-top-color: var(--purple-600); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--purple-600); font-weight: 500; }

    /* ── Step pill ── */
    .step-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .step-pill { font-size: 12px; background: var(--purple-50); color: var(--purple-800); padding: 3px 12px; border-radius: 20px; font-weight: 500; }
    .step-info { font-size: 12px; color: var(--gray-400); }
  </style>
</head>
<body>

<!-- Top sticky bar -->
<div class="topbar">
  <div class="topbar-title" id="topbar-title">Survey Kepuasan Organisasi</div>
  <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="progress-label" id="pbar-label">Langkah 0 dari 12</div>
</div>

<!-- Main scrollable content -->
<div class="main" id="main"></div>

<!-- Fixed bottom nav -->
<div class="bottom-bar" id="bottom-bar">
  <button class="btn-next" style="width:100%" id="btn-start" onclick="submitIdentitas()">
    Mulai Survey <i class="ti ti-arrow-right" aria-hidden="true"></i>
  </button>
</div>

<script>
/* =======================================================
   ✏️  KONFIGURASI — ubah bagian ini sesuai kebutuhanmu
======================================================= */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4sWAdIOP3rAzvxQKzRx4DAgvFj-mOjSUxZ1d_JrV7cbQjgXjoL8n17sQfHFIYloqP/exec";
const NAMA_ORGANISASI = "Organisasiku";
const PERTANYAAN = [
  "Organisasi ini memiliki visi dan misi yang jelas dan mudah dipahami.",
  "Kepemimpinan organisasi berjalan secara efektif dan bertanggung jawab.",
  "Komunikasi antar anggota dan pengurus berjalan dengan baik.",
  "Program kerja relevan dan memberikan manfaat nyata bagi anggota.",
  "Organisasi memberikan kesempatan yang sama bagi setiap anggota untuk berkembang.",
  "Kegiatan organisasi terlaksana sesuai dengan rencana yang ditetapkan.",
  "Saya merasa nyaman dan dihargai menjadi bagian dari organisasi ini.",
  "Fasilitas dan sumber daya yang disediakan sudah memadai.",
  "Organisasi terbuka terhadap masukan dan kritik dari anggota.",
  "Saya puas dengan kinerja organisasi secara keseluruhan."
];
const LABEL_SKALA = [
  "Sangat tidak setuju",
  "Tidak setuju",
  "Netral",
  "Setuju",
  "Sangat setuju"
];
/* ======================================================= */

const N = PERTANYAAN.length;
const TOTAL = N + 2; // identitas + pertanyaan + saran
const ans = new Array(N).fill(null);
let cur = 0; // 0=identitas, 1..N=pertanyaan, N+1=saran
let identitas = { nama: "", nim: "" };

function pct() { return Math.round((cur / TOTAL) * 100); }

function updateBar(label) {
  document.getElementById('pbar').style.width = pct() + '%';
  document.getElementById('pbar-label').textContent = label || `Langkah ${cur} dari ${TOTAL}`;
}

function setBottomBar(html) {
  document.getElementById('bottom-bar').innerHTML = html;
}

/* ── Identitas ── */
function renderIdentitas() {
  updateBar('Langkah awal — isi data diri');
  document.getElementById('topbar-title').textContent = NAMA_ORGANISASI;
  document.getElementById('main').innerHTML = `
    <div class="panel">
      <div class="step-row"><span class="step-pill">Mulai</span><span class="step-info">isi data dirimu</span></div>
      <div class="q-accent">Hi!</div>
      <div class="q-text" style="margin-bottom:24px">Sebelum memulai, lengkapi data dirimu ya.</div>
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="inp-nama" placeholder="Nama lengkapmu" value="${identitas.nama}" />
      </div>
      <div class="field">
        <label>NIM</label>
        <input type="text" id="inp-nim" inputmode="numeric" placeholder="NIM kamu" value="${identitas.nim}" />
      </div>
      <div class="err" id="err-id">Nama dan NIM wajib diisi.</div>
    </div>`;
  setBottomBar(`
    <button class="btn-next" style="width:100%" onclick="submitIdentitas()">
      Mulai Survey <i class="ti ti-arrow-right" aria-hidden="true"></i>
    </button>`);
}

function submitIdentitas() {
  const nama = document.getElementById('inp-nama').value.trim();
  const nim  = document.getElementById('inp-nim').value.trim();
  if (!nama || !nim) { document.getElementById('err-id').style.display = 'block'; return; }
  identitas = { nama, nim };
  cur = 1;
  renderQ(0);
}

/* ── Pertanyaan ── */
function renderQ(i) {
  updateBar(`Pertanyaan ${i+1} dari ${N}`);
  document.getElementById('topbar-title').textContent = NAMA_ORGANISASI;
  const num = String(i + 1).padStart(2, '0');
  document.getElementById('main').innerHTML = `
    <div class="panel">
      <div class="step-row">
        <span class="step-pill">${i+1} / ${N}</span>
        <span class="step-info">pertanyaan</span>
      </div>
      <div class="q-accent">${num}</div>
      <div class="q-text">${PERTANYAAN[i]}</div>
      <div class="likert-col">
        ${[1,2,3,4,5].map(n => `
          <button class="likert-opt${ans[i]===n?' sel':''}" onclick="pick(${i},${n})" aria-label="${n} - ${LABEL_SKALA[n-1]}">
            <span class="num">${n}</span>
            <span class="lbl">${LABEL_SKALA[n-1]}</span>
          </button>`).join('')}
      </div>
      <div class="err" id="err-q">Pilih salah satu jawaban.</div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setBottomBar(`
    <button class="btn-back" onclick="goBack(${i})" aria-label="Kembali">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
    </button>
    <button class="btn-next" onclick="goNext(${i})">
      ${i < N-1 ? 'Lanjut <i class="ti ti-arrow-right" aria-hidden="true"></i>' : 'Ke masukan <i class="ti ti-arrow-right" aria-hidden="true"></i>'}
    </button>`);
}

function pick(i, v) {
  ans[i] = v;
  document.querySelectorAll('.likert-opt').forEach((el, idx) => {
    el.classList.toggle('sel', idx + 1 === v);
  });
  const e = document.getElementById('err-q');
  if (e) e.style.display = 'none';
}

function goNext(i) {
  if (ans[i] === null) { document.getElementById('err-q').style.display = 'block'; return; }
  cur++;
  if (i < N - 1) renderQ(i + 1);
  else renderSaran();
}

function goBack(i) {
  cur--;
  if (i === 0) renderIdentitas();
  else renderQ(i - 1);
}

/* ── Saran ── */
function renderSaran() {
  updateBar('Langkah terakhir — kritik & saran');
  document.getElementById('main').innerHTML = `
    <div class="panel">
      <div class="step-row"><span class="step-pill">Terakhir</span><span class="step-info">kritik &amp; saran</span></div>
      <div class="q-accent">+</div>
      <div class="q-text">Ada masukan untuk ${NAMA_ORGANISASI}?</div>
      <textarea id="saran" placeholder="Tulis kritik, saran, atau harapan kamu (opsional)..."></textarea>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setBottomBar(`
    <button class="btn-back" onclick="backToLastQ()" aria-label="Kembali">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
    </button>
    <button class="btn-submit" onclick="submitSurvey()">
      Kirim Survey <i class="ti ti-send" aria-hidden="true"></i>
    </button>`);
}

function backToLastQ() {
  cur--;
  renderQ(N - 1);
}

/* ── Submit ── */
async function submitSurvey() {
  const saran = document.getElementById('saran').value.trim();
  const total = ans.reduce((a, b) => a + b, 0);
  const avg   = total / N;
  let ket = '', col = '';
  if      (avg >= 4.5) { ket = 'Sangat Baik';    col = '#0F6E56'; }
  else if (avg >= 3.5) { ket = 'Baik';            col = '#3B6D11'; }
  else if (avg >= 2.5) { ket = 'Cukup';           col = '#854F0B'; }
  else                 { ket = 'Perlu Perhatian'; col = '#A32D2D'; }

  const payload = { nama: identitas.nama, nim: identitas.nim };
  ans.forEach((v, i) => { payload[`p${i+1}`] = v; });
  payload.rata = avg.toFixed(2);
  payload.predikat = ket;
  payload.saran = saran;

  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = `<div class="spinner"></div><div class="loading-text">Mengirim data...</div>`;
  document.body.appendChild(overlay);
  setBottomBar('');

  let ok = false;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    ok = true;
  } catch(e) { ok = false; }

  document.body.removeChild(overlay);
  document.getElementById('pbar').style.width = '100%';
  document.getElementById('pbar-label').textContent = 'Selesai';

  document.getElementById('main').innerHTML = `
    <div class="panel" style="text-align:center;padding-top:8px">
      <div class="result-icon"><i class="ti ti-circle-check" aria-hidden="true"></i></div>
      <div class="result-title">Survey terkirim!</div>
      <div class="result-sub">Terima kasih, ${identitas.nama}.<br>Masukanmu sangat berarti untuk ${NAMA_ORGANISASI}.</div>
      <div style="text-align:center;margin-bottom:16px">
        ${ok
          ? `<span class="badge-ok"><i class="ti ti-database" aria-hidden="true"></i> Tersimpan ke Google Sheets</span>`
          : `<span class="badge-err"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Gagal simpan — cek URL Apps Script</span>`}
      </div>
      <div class="id-chip">
        <b>${identitas.nama}</b><br>NIM ${identitas.nim} · ${NAMA_ORGANISASI}
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="slabel">Rata-rata</div>
          <div class="sval" style="color:${col}">${avg.toFixed(2)}</div>
          <div class="ssub">dari 5.00</div>
        </div>
        <div class="stat-card">
          <div class="slabel">Predikat</div>
          <div class="sval" style="font-size:15px;color:${col}">${ket}</div>
          <div class="ssub">&nbsp;</div>
        </div>
      </div>
      <div class="bar-section" style="text-align:left">
        <h3>Rincian per pertanyaan</h3>
        ${ans.map((v,i)=>`
          <div class="bar-row">
            <div class="bar-label">P${i+1}. ${PERTANYAAN[i].split(' ').slice(0,3).join(' ')}…</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(v/5)*100}%"></div></div>
            <div class="bar-num">${v}</div>
          </div>`).join('')}
      </div>
      ${saran ? `
      <div class="saran-box" style="text-align:left">
        <div class="slabel2"><i class="ti ti-message" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Masukan kamu</div>
        <div class="stext">${saran}</div>
      </div>` : ''}
    </div>`;
  setBottomBar('');
}

renderIdentitas();
</script>
</body>
</html>
